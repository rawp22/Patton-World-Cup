name: Fetch match results

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * 11-30 6 *"
    - cron: "*/5 * 1-19 7 *"

permissions:
  contents: write

jobs:
  fetch-results:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch final scores and rebuild dashboard
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_LEAGUE_ID: "1"
          API_FOOTBALL_SEASON: "2026"
        run: python scripts/fetch_results.py

      - name: Commit updated dashboard
        run: |
          if git diff --quiet; then
            echo "No score updates to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/matches.json outputs/world-cup-fantasy-dashboard.html site/index.html
          git commit -m "Update match results"
          git push
